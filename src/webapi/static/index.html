<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>aMule Web</title>
  <link rel="icon" href="img/favicon.ico">
  <!-- Apply the saved theme before first paint to avoid a flash. -->
  <script>
    try {
      var t = localStorage.getItem("amule.theme");
      if (t === "light" || t === "dark") document.documentElement.dataset.theme = t;
    } catch (e) {}
  </script>
  <link rel="stylesheet" href="css/app.css">
  <!-- Resolve the vendored libraries' bare specifiers (hooks imports "preact"). -->
  <script type="importmap">
  {
    "imports": {
      "preact":       "./js/vendor/preact.module.js",
      "preact/hooks": "./js/vendor/hooks.module.js",
      "htm":          "./js/vendor/htm.module.js"
    }
  }
  </script>
</head>
<body>
  <div id="app">
    <div class="placeholder placeholder-loading">Loading…</div>
  </div>
  <noscript>This application requires JavaScript.</noscript>
  <script type="module" src="js/app.js"></script>
</body>
</html>
